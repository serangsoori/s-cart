<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>말랑pick</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR",sans-serif;background:#fff5f8;color:#2d1a22;min-height:100vh}

/* NAV */
nav{background:#fff;border-bottom:1px solid #f4c0d1;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;height:52px}
.logo{font-size:17px;font-weight:700;color:#2d1a22}
.logo em{color:#d4537e;font-style:normal}
.nav-tabs{display:flex;gap:0}
.nav-tab{padding:0 14px;height:52px;display:flex;align-items:center;font-size:13px;font-weight:500;color:#993556;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:inherit;transition:all .2s;white-space:nowrap}
.nav-tab:hover{color:#d4537e}
.nav-tab.on{color:#d4537e;font-weight:700;border-bottom-color:#d4537e}
.cart-btn{display:flex;align-items:center;gap:6px;background:#d4537e;color:#fff;border:none;border-radius:24px;padding:7px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s}
.cart-btn:hover{background:#b8436a}
.cart-count{background:#fff;color:#d4537e;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* PAGE */
.page{display:none}
.page.on{display:block;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* ── STEP FLOW ── */
.step-flow{max-width:680px;margin:0 auto;padding:24px 20px}

/* 스텝 인디케이터 */
.step-indicator{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:32px}
.step-dot{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1}
.step-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .3s}
.step-circle.done{background:#d4537e;color:#fff}
.step-circle.active{background:#d4537e;color:#fff;box-shadow:0 0 0 4px #fbeaf0}
.step-circle.todo{background:#f4c0d1;color:#fff}
.step-label{font-size:10px;color:#993556;font-weight:500;white-space:nowrap}
.step-line{height:2px;background:#f4c0d1;flex:1;margin:0;margin-top:-20px}
.step-line.done{background:#d4537e}

/* STEP 1 */
.step-title{font-size:20px;font-weight:700;color:#2d1a22;margin-bottom:6px;letter-spacing:-.3px}
.step-sub{font-size:13px;color:#993556;margin-bottom:20px;line-height:1.6}

.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.cat-btn{border:1.5px solid #f4c0d1;border-radius:24px;padding:6px 14px;font-size:12px;font-weight:500;background:#fff;color:#993556;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.cat-btn.on,.cat-btn:hover{background:#fbeaf0;border-color:#d4537e;color:#d4537e;font-weight:700}

.pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pick-card{border:1.5px solid #f4c0d1;border-radius:14px;overflow:hidden;background:#fff;cursor:pointer;transition:all .2s;position:relative}
.pick-card:hover{border-color:#d4537e;transform:translateY(-2px);box-shadow:0 6px 16px rgba(212,83,126,.12)}
.pick-card.selected{border-color:#d4537e;background:#fbeaf0}
.pick-card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#fbeaf0;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;overflow:hidden}
.pick-card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pick-check{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;background:#d4537e;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.pick-card.selected .pick-check{opacity:1}
.pick-card-body{padding:8px 10px 10px}
.pick-card-cat{font-size:10px;color:#b4a2ac;margin-bottom:2px}
.pick-card-name{font-size:11px;font-weight:700;color:#2d1a22;line-height:1.35}

.step-next-btn{width:100%;background:#d4537e;color:#fff;border:none;border-radius:16px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:20px;transition:background .2s}
.step-next-btn:hover{background:#b8436a}
.step-next-btn:disabled{background:#f4c0d1;cursor:not-allowed}

/* STEP 2 */
.cart-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.cart-item{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #f4c0d1;border-radius:14px;padding:12px 14px}
.cart-item-img{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#fbeaf0;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1}
.cart-item-name{font-size:13px;font-weight:700;color:#2d1a22;margin-bottom:3px}
.cart-item-cat{font-size:11px;color:#993556}
.cart-item-del{background:none;border:1px solid #f4c0d1;border-radius:20px;padding:5px 11px;font-size:11px;color:#993556;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .2s}
.cart-item-del:hover{border-color:#d4537e;color:#d4537e;background:#fbeaf0}
.empty-cart{text-align:center;padding:40px;color:#b4a2ac;font-size:14px}

/* STEP 3 */
.result-intro{background:#fbeaf0;border:1px solid #f4c0d1;border-radius:14px;padding:16px;margin-bottom:20px;font-size:13px;color:#72243e;line-height:1.7}
.result-intro strong{color:#d4537e}

.seller-result{border:1.5px solid #f4c0d1;border-radius:16px;overflow:hidden;background:#fff;margin-bottom:14px;transition:all .2s}
.seller-result.best{border-color:#d4537e;box-shadow:0 4px 16px rgba(212,83,126,.15)}
.seller-result-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #fbeaf0;background:#fbeaf0}
.seller-result.best .seller-result-hd{background:#fbeaf0}
.best-badge{background:#d4537e;color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;flex-shrink:0}
.seller-av-sm{width:36px;height:36px;border-radius:50%;background:#fff;border:1.5px solid #f4c0d1;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#d4537e;flex-shrink:0}
.seller-result-name{font-size:14px;font-weight:700;color:#2d1a22;flex:1}
.seller-result-meta{font-size:11px;color:#993556;margin-top:2px}
.seller-result-body{padding:14px 16px}
.coverage-bar{height:6px;background:#f4c0d1;border-radius:3px;margin-bottom:10px;overflow:hidden}
.coverage-fill{height:100%;background:#d4537e;border-radius:3px;transition:width .5s ease}
.coverage-text{font-size:12px;color:#993556;margin-bottom:12px}
.available-items{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.avail-tag{background:#fbeaf0;border:1px solid #f4c0d1;border-radius:20px;padding:3px 10px;font-size:11px;color:#2d1a22}
.unavail-tag{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:20px;padding:3px 10px;font-size:11px;color:#b4b4b4;text-decoration:line-through}
.price-summary{background:#fbeaf0;border-radius:10px;padding:12px 14px;margin-bottom:12px}
.price-row-s{display:flex;justify-content:space-between;font-size:12px;color:#72243e;margin-bottom:5px}
.price-row-s:last-child{margin-bottom:0;font-weight:700;font-size:13px;color:#2d1a22;border-top:1px solid #f4c0d1;padding-top:7px;margin-top:5px}
.go-seller-btn{width:100%;background:#d4537e;color:#fff;border:none;border-radius:12px;padding:11px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s;text-decoration:none;display:block;text-align:center}
.go-seller-btn:hover{background:#b8436a}

/* ── 말랑이 목록 페이지 (기존) ── */
.wrap{max-width:1080px;margin:0 auto;padding:26px 28px}
.top-controls{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-box input{border:1.5px solid #f4c0d1;border-radius:24px;padding:9px 16px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#2d1a22;width:220px;transition:border-color .2s}
.search-box input:focus{border-color:#d4537e}
.search-box input::placeholder{color:#b4a2ac}
.section-title-lg{font-size:20px;font-weight:700;color:#2d1a22;margin-bottom:4px}
.section-sub-sm{font-size:13px;color:#993556;margin-bottom:20px}

.prod-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:13px}
.pcard{border:1px solid #f4c0d1;border-radius:16px;overflow:hidden;background:#fff;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s}
.pcard:hover{transform:translateY(-4px);box-shadow:0 8px 22px rgba(212,83,126,.14);border-color:#d4537e}
.pcard-img{width:100%;aspect-ratio:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pcard-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .3s}
.pcard:hover .pcard-img img{transform:scale(1.07)}
.pcard-emoji{font-size:44px;position:relative;z-index:1}
.seller-dots{position:absolute;top:8px;left:8px;display:flex;gap:3px;z-index:2;flex-wrap:wrap;max-width:70%}
.sdot{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;color:#fff;line-height:1.4;white-space:nowrap}
.sdot-xhs{background:#ff2442}
.sdot-tao{background:#ff6900}
.pcard-body{padding:9px 11px 12px}
.pcard-cat{font-size:10px;color:#b4a2ac;margin-bottom:2px}
.pcard-name{font-size:12px;font-weight:700;color:#2d1a22;line-height:1.35;margin-bottom:5px}
.pcard-price-main{font-size:13px;font-weight:700;color:#d4537e}
.pcard-price-sub{font-size:10px;color:#b4a2ac;margin-top:1px}
.bg-crunch{background:#FEF3CD}
.bg-transparent{background:#E8F4FD}
.bg-kuma{background:#EEF3FE}
.bg-squishy{background:#FFF0E8}
.bg-slang{background:#FBEAF0}
.bg-etc{background:#F0FAF0}

/* 판매자 페이지 */
.seller-page{max-width:1080px;margin:0 auto;padding:28px}
.sfilter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.sfilter-btn{display:flex;align-items:center;gap:6px;border:1.5px solid #f4c0d1;border-radius:24px;padding:7px 15px;font-size:12px;font-weight:500;background:#fff;color:#993556;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.sfilter-btn.on,.sfilter-btn:hover{background:#fbeaf0;border-color:#d4537e;color:#d4537e;font-weight:700}
.seller-block{margin-bottom:40px}
.seller-hd{display:flex;align-items:flex-start;gap:14px;background:#fbeaf0;border:1px solid #f4c0d1;border-radius:16px;padding:16px 18px;margin-bottom:14px}
.seller-av{width:46px;height:46px;border-radius:50%;background:#fff;border:1.5px solid #f4c0d1;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#d4537e;flex-shrink:0}
.seller-info{flex:1}
.seller-nm{font-size:15px;font-weight:700;color:#2d1a22;margin-bottom:3px}
.seller-mt{font-size:12px;color:#993556;margin-bottom:6px}
.seller-desc{font-size:12px;color:#72243e;line-height:1.7;margin-bottom:8px}
.seller-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.stag{background:#fff;border:1px solid #f4c0d1;border-radius:20px;padding:3px 9px;font-size:11px;color:#72243e}
.seller-links{display:flex;gap:7px;flex-wrap:wrap}
.seller-link-btn{display:inline-flex;align-items:center;gap:4px;color:#fff;border:none;border-radius:18px;padding:7px 14px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;transition:opacity .2s}
.seller-link-btn:hover{opacity:.85}
.btn-xhs{background:#ff2442}
.btn-tao{background:#ff6900}
.seller-plat{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.plat-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px}
.plat-xhs{background:#fff0f3;border:1.5px solid #ff2442;color:#cc1133}
.plat-tao{background:#fff2e8;border:1.5px solid #ff6900;color:#cc4400}
.seller-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}

/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(75,21,40,.52);z-index:500;align-items:flex-start;justify-content:center;padding:28px 14px;overflow-y:auto}
.modal-bg.open{display:flex;animation:fadeUp .2s ease}
.modal{background:#fff;border-radius:22px;max-width:720px;width:100%;border:1px solid #f4c0d1}
.modal-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #fbeaf0;border-radius:22px 22px 0 0;position:sticky;top:0;background:#fff;z-index:10}
.modal-bar-title{font-size:14px;font-weight:700;color:#2d1a22}
.modal-x{background:none;border:1px solid #f4c0d1;border-radius:18px;padding:5px 13px;font-size:12px;color:#993556;cursor:pointer;font-family:inherit;transition:all .2s}
.modal-x:hover{background:#fbeaf0;border-color:#d4537e;color:#d4537e}
.modal-top{display:flex;gap:16px;padding:18px 20px 14px}
.modal-thumb{width:170px;height:170px;border-radius:14px;flex-shrink:0;border:1px solid #f4c0d1;display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden}
.modal-thumb img{width:100%;height:100%;object-fit:cover}
.modal-right{flex:1}
.modal-pname{font-size:18px;font-weight:700;color:#2d1a22;line-height:1.3;margin-bottom:6px}
.modal-desc{font-size:12px;color:#72243e;line-height:1.7;background:#fbeaf0;border-radius:10px;padding:9px 12px;margin-bottom:10px}
.so-wrap{padding:0 20px 20px}
.so-title{font-size:13px;font-weight:700;color:#2d1a22;margin-bottom:10px}
.so-card{border:1px solid #f4c0d1;border-radius:14px;padding:13px 15px;margin-bottom:9px;transition:border-color .2s}
.so-card:hover{border-color:#ff2442}
.so-hd{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.so-av{width:30px;height:30px;border-radius:50%;background:#fbeaf0;border:1px solid #f4c0d1;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#d4537e;flex-shrink:0}
.so-nm{font-size:13px;font-weight:700;color:#2d1a22}
.so-mt{font-size:10px;color:#993556;margin-top:1px}
.so-prices{margin-left:auto;text-align:right}
.so-krw{font-size:14px;font-weight:700;color:#d4537e}
.so-cny{font-size:10px;color:#b4a2ac;margin-top:1px}
.so-note{font-size:11px;color:#72243e;background:#fef9e7;border:1px solid #f4d03f;border-radius:8px;padding:7px 10px;line-height:1.6;margin-bottom:8px}
.so-note.info{background:#e8f8f5;border-color:#a9dfbf}
.so-btn-row{display:flex;gap:7px}
.so-btn{display:inline-flex;align-items:center;gap:4px;color:#fff;border:none;border-radius:18px;padding:7px 14px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;transition:opacity .2s}
.so-btn:hover{opacity:.85}

footer{background:#4b1528;color:#f4c0d1;text-align:center;padding:22px;font-size:12px}
footer strong{color:#fff}

@media(max-width:900px){.prod-grid{grid-template-columns:repeat(3,1fr)} .seller-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){
  nav{padding:0 14px;height:50px}
  .logo{font-size:15px}
  .nav-tab{padding:0 10px;font-size:12px;height:50px}
  .nav-tabs{overflow-x:auto;scrollbar-width:none}
  .nav-tabs::-webkit-scrollbar{display:none}
  .cart-btn{padding:6px 10px;font-size:11px}
  .step-flow{padding:18px 14px}
  .step-title{font-size:18px}
  .pick-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .prod-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .seller-grid{grid-template-columns:repeat(2,1fr)}
  .seller-page{padding:16px 14px}
  .wrap{padding:18px 14px}
  .modal-bg{padding:0;align-items:flex-end}
  .modal{border-radius:20px 20px 0 0;max-height:92vh}
  .modal-top{flex-direction:column}
  .modal-thumb{width:100%;height:180px}
  footer{padding:18px 14px;font-size:11px}
}
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="goPage('pick',document.getElementById('tab-pick'))">말랑<em>pick</em></div>
  <div class="nav-tabs">
    <button class="nav-tab on" id="tab-pick" onclick="goPage('pick',this)">담기</button>
    <button class="nav-tab" id="tab-items" onclick="goPage('items',this)">말랑이 보기</button>
    <button class="nav-tab" id="tab-sellers" onclick="goPage('sellers',this)">판매자 보기</button>
  </div>
  <button class="cart-btn" onclick="goPage('pick',document.getElementById('tab-pick'));goStep(2)">
    담은 말랑이 <span class="cart-count" id="cart-count">0</span>
  </button>
</nav>

<!-- ═══ PICK PAGE (스텝 플로우) ═══ -->
<div id="page-pick" class="page on">
  <div class="step-flow">

    <!-- 스텝 인디케이터 -->
    <div class="step-indicator">
      <div class="step-dot">
        <div class="step-circle active" id="si-1">1</div>
        <div class="step-label">말랑이 담기</div>
      </div>
      <div class="step-line" id="sl-1"></div>
      <div class="step-dot">
        <div class="step-circle todo" id="si-2">2</div>
        <div class="step-label">목록 확인</div>
      </div>
      <div class="step-line" id="sl-2"></div>
      <div class="step-dot">
        <div class="step-circle todo" id="si-3">3</div>
        <div class="step-label">판매자 추천</div>
      </div>
    </div>

    <!-- STEP 1 -->
    <div id="step-1">
      <div class="step-title">원하는 말랑이를 골라요</div>
      <div class="step-sub">사고 싶은 말랑이를 모두 담아주세요.<br>어디서 한 번에 살 수 있는지 찾아드릴게요!</div>
      <div class="cat-filter">
        <button class="cat-btn on" onclick="setPickCat('전체',this)">전체</button>
        <button class="cat-btn" onclick="setPickCat('크런치',this)">크런치</button>
        <button class="cat-btn" onclick="setPickCat('투명',this)">투명 수제볼</button>
        <button class="cat-btn" onclick="setPickCat('쿠마',this)">쿠마</button>
        <button class="cat-btn" onclick="setPickCat('스퀴시',this)">스퀴시</button>
        <button class="cat-btn" onclick="setPickCat('슬랑이',this)">슬랑이</button>
      </div>
      <div class="pick-grid" id="pick-grid"></div>
      <button class="step-next-btn" id="step1-next" onclick="goStep(2)" disabled>다음 단계 →</button>
    </div>

    <!-- STEP 2 -->
    <div id="step-2" style="display:none">
      <div class="step-title">담은 말랑이 확인</div>
      <div class="step-sub">빼고 싶은 게 있으면 삭제해요.</div>
      <div class="cart-list" id="cart-list"></div>
      <button class="step-next-btn" onclick="goStep(3)">최적 판매자 찾기 →</button>
      <button onclick="goStep(1)" style="width:100%;background:none;border:1px solid #f4c0d1;border-radius:16px;padding:13px;font-size:14px;font-weight:500;color:#993556;font-family:inherit;cursor:pointer;margin-top:10px">← 더 담으러 가기</button>
    </div>

    <!-- STEP 3 -->
    <div id="step-3" style="display:none">
      <div class="step-title">최적 판매자 추천</div>
      <div class="step-sub" id="step3-sub"></div>
      <div id="result-list"></div>
      <button onclick="goStep(1)" style="width:100%;background:none;border:1px solid #f4c0d1;border-radius:16px;padding:13px;font-size:14px;font-weight:500;color:#993556;font-family:inherit;cursor:pointer;margin-top:4px">← 처음부터 다시</button>
    </div>

  </div>
</div>

<!-- ═══ 말랑이 목록 ═══ -->
<div id="page-items" class="page">

const CAT_BG = {
  '크런치': 'bg-crunch',
  '투명': 'bg-transparent',
  '쿠마': 'bg-kuma',
  '스퀴시': 'bg-squishy',
  '슬랑이': 'bg-slang',
  '기타': 'bg-etc',
};

// 배대지 배송비 (위안)
const BAEDAE_FEE_CNY = 22; // 약 5,000원 (무게 기준 평균)

// ── 카트 ──
let cart = new Set();

function toggleCart(id) {
  if(cart.has(id)) cart.delete(id);
  else cart.add(id);
  updateCartUI();
  renderPickGrid();
}

function updateCartUI() {
  document.getElementById('cart-count').textContent = cart.size;
  const btn = document.getElementById('step1-next');
  if(btn) btn.disabled = cart.size === 0;
}

function removeFromCart(id) {
  cart.delete(id);
  updateCartUI();
  renderPickGrid();
  renderCartList();
  if(cart.size === 0) goStep(1);
}

// ── STEP 전환 ──
let currentStep = 1;

function goStep(n) {
  currentStep = n;
  [1,2,3].forEach(i => {
    const el = document.getElementById('step-'+i);
    if(el) el.style.display = i===n ? 'block' : 'none';
    const si = document.getElementById('si-'+i);
    if(si) {
      si.classList.remove('active','done','todo');
      if(i < n) si.classList.add('done');
      else if(i === n) si.classList.add('active');
      else si.classList.add('todo');
    }
  });
  [1,2].forEach(i => {
    const sl = document.getElementById('sl-'+i);
    if(sl) sl.classList.toggle('done', i < n);
  });
  if(n===2) renderCartList();
  if(n===3) renderResults();
  window.scrollTo(0,0);
}

// ── STEP 1: 픽 그리드 ──
let pickCat = '전체';
function setPickCat(cat, btn) {
  pickCat = cat;
  document.querySelectorAll('.cat-filter .cat-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderPickGrid();
}

function renderPickGrid() {
  let list = PRODUCTS;
  if(pickCat !== '전체') list = list.filter(p=>p.cat===pickCat);
  const grid = document.getElementById('pick-grid');
  if(!grid) return;
  grid.innerHTML = list.map(p=>{
    const sel = cart.has(p.id);
    const hasImg = p.img && IMGS[p.img];
    const bg = CAT_BG[p.cat]||'bg-etc';
    return `<div class="pick-card${sel?' selected':''}" onclick="toggleCart(${p.id})">
      <div class="pcard-img ${bg}" style="aspect-ratio:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center">
        ${hasImg?`<img src="${IMGS[p.img]}" alt="${p.name}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">`:`<span style="font-size:28px;position:relative;z-index:1;color:#993556;font-weight:700">${p.emoji||p.name.charAt(0)}</span>`}
        <div class="pick-check">✓</div>
      </div>
      <div class="pick-card-body">
        <div class="pick-card-cat">${p.cat}</div>
        <div class="pick-card-name">${p.name}</div>
      </div>
    </div>`;
  }).join('');
}

// ── STEP 2: 카트 목록 ──
function renderCartList() {
  const list = document.getElementById('cart-list');
  if(!list) return;
  const items = PRODUCTS.filter(p=>cart.has(p.id));
  if(!items.length) {
    list.innerHTML = '<div class="empty-cart">담은 말랑이가 없어요</div>';
    return;
  }
  list.innerHTML = items.map(p=>{
    const hasImg = p.img && IMGS[p.img];
    const bg = CAT_BG[p.cat]||'bg-etc';
    return `<div class="cart-item">
      <div class="cart-item-img ${bg}">
        ${hasImg?`<img src="${IMGS[p.img]}" alt="${p.name}">`:`<span style="font-size:24px;color:#993556;font-weight:700">${p.emoji||p.name.charAt(0)}</span>`}
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-cat">${p.cat}</div>
      </div>
      <button class="cart-item-del" onclick="removeFromCart(${p.id})">빼기</button>
    </div>`;
  }).join('');
}

// ── STEP 3: 판매자 추천 ──
function renderResults() {
  const cartItems = PRODUCTS.filter(p=>cart.has(p.id));
  const total = cartItems.length;

  // 판매자별 커버리지 계산
  const sellerScores = Object.entries(SELLERS).map(([sid, s]) => {
    const available = cartItems.filter(p=>p.sellers.some(sv=>sv.id===sid));
    const unavailable = cartItems.filter(p=>!p.sellers.some(sv=>sv.id===sid));
    const totalCny = available.reduce((sum, p)=>{
      const sv = p.sellers.find(sv=>sv.id===sid);
      return sum + (sv ? parseFloat(sv.cny) : 0);
    }, 0);
    return { sid, s, available, unavailable, totalCny, count: available.length };
  }).filter(r=>r.count > 0)
    .sort((a,b)=> b.count - a.count || a.totalCny - b.totalCny);

  document.getElementById('step3-sub').textContent =
    `${total}개 말랑이 기준으로 최적 판매자를 찾았어요.`;

  const list = document.getElementById('result-list');
  list.innerHTML = sellerScores.map((r, idx)=>{
    const isBest = idx === 0;
    const pct = Math.round(r.count / total * 100);
    const totalKrw = Math.round(r.totalCny * CNY);
    const baedaeKrw = Math.round(BAEDAE_FEE_CNY * CNY);
    const grandTotal = totalKrw + baedaeKrw;
    const platBadges = r.s.plat.map(pl=>
      pl==='xhs'?`<span class="plat-badge plat-xhs">샤오홍수</span>`:`<span class="plat-badge plat-tao">타오바오</span>`
    ).join('');
    const linkBtns = r.s.links.map(l=>
      `<a class="go-seller-btn" href="${l.url}" target="_blank" style="margin-top:0">${l.label} →</a>`
    ).join('');

    return `<div class="seller-result${isBest?' best':''}">
      <div class="seller-result-hd">
        <div class="seller-av-sm">${r.s.av}</div>
        <div style="flex:1">
          <div class="seller-result-name">${r.s.name}</div>
          <div class="seller-result-meta">${r.s.meta}</div>
        </div>
        ${platBadges}
        ${isBest?'<span class="best-badge">최적 추천</span>':''}
      </div>
      <div class="seller-result-body">
        <div class="coverage-bar"><div class="coverage-fill" style="width:${pct}%"></div></div>
        <div class="coverage-text">${total}개 중 <strong style="color:#d4537e">${r.count}개</strong> 구매 가능 (${pct}%)</div>
        <div class="available-items">
          ${r.available.map(p=>`<span class="avail-tag">${p.name}</span>`).join('')}
          ${r.unavailable.map(p=>`<span class="unavail-tag">${p.name}</span>`).join('')}
        </div>
        <div class="price-summary">
          <div class="price-row-s"><span>말랑이 합계</span><span>${r.totalCny.toFixed(1)}위안 (${totalKrw.toLocaleString()}원)</span></div>
          <div class="price-row-s"><span>배대지 배송비 (예상)</span><span>약 ${BAEDAE_FEE_CNY}위안 (${baedaeKrw.toLocaleString()}원)</span></div>
          <div class="price-row-s"><span>총 예상 금액</span><span>${(r.totalCny+BAEDAE_FEE_CNY).toFixed(1)}위안 (${grandTotal.toLocaleString()}원)</span></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${linkBtns}</div>
      </div>
    </div>`;
  }).join('');
}

// ── 말랑이 목록 (기존) ──
let curCat = '전체';
function setCat(cat, btn) {
  curCat = cat;
  document.querySelectorAll('#page-items .cat-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderGrid();
}
function renderGrid() {
  const q = document.getElementById('search-q').value.trim();
  let list = PRODUCTS;
  if(curCat !== '전체') list = list.filter(p=>p.cat===curCat);
  if(q) list = list.filter(p=>p.name.includes(q));
  const grid = document.getElementById('main-grid');
  if(!list.length) { grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:#b4a2ac">검색 결과가 없어요</div>'; return; }
  const minCny = p => {
    const prices = p.sellers.map(s=>parseFloat(s.cny)).filter(n=>!isNaN(n));
    return prices.length ? Math.min(...prices) : null;
  };
  grid.innerHTML = list.map(p=>{
    const bg = CAT_BG[p.cat]||'bg-etc';
    const hasImg = p.img && IMGS[p.img];
    const plats = [...new Set(p.sellers.flatMap(s=>SELLERS[s.id].plat))];
    const dots = plats.map(pl=>pl==='xhs'?'<span class="sdot sdot-xhs">小</span>':'<span class="sdot sdot-tao">T</span>').join('');
    const mc = minCny(p);
    return `<div class="pcard" onclick="openModal(${p.id})">
      <div class="pcard-img ${bg}">
        ${hasImg?`<img src="${IMGS[p.img]}" alt="${p.name}">`:`<span class="pcard-emoji" style="color:#993556">${p.emoji||p.name.charAt(0)}</span>`}
        <div class="seller-dots">${dots}</div>
      </div>
      <div class="pcard-body">
        <div class="pcard-cat">${p.cat}</div>
        <div class="pcard-name">${p.name}</div>
        ${mc?`<div class="pcard-price-main">${fmtKrw(mc.toString())}~</div>`:''}
        <div class="pcard-price-sub">판매자 ${p.sellers.length}곳</div>
      </div>
    </div>`;
  }).join('');
}

// ── 판매자 페이지 ──
function renderSellerPage() {
  const frow = document.getElementById('sfilter-row');
  frow.innerHTML = `<button class="sfilter-btn on" onclick="setSeller('all',this)">전체 보기</button>` +
    Object.entries(SELLERS).map(([sid,s])=>
      `<button class="sfilter-btn" onclick="setSeller('${sid}',this)">${s.av} ${s.name}</button>`
    ).join('');
  renderSellerSections('all');
}
let curSeller = 'all';
function setSeller(sid, btn) {
  curSeller = sid;
  document.querySelectorAll('.sfilter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderSellerSections(sid);
}
function renderSellerSections(sid) {
  const wrap = document.getElementById('seller-sections');
  const toShow = sid==='all' ? Object.keys(SELLERS) : [sid];
  wrap.innerHTML = toShow.map(s=>{
    const seller = SELLERS[s];
    const prods = PRODUCTS.filter(p=>p.sellers.some(sv=>sv.id===s));
    const platBadges = seller.plat.map(pl=>
      pl==='xhs'?'<span class="plat-badge plat-xhs">샤오홍수</span>':'<span class="plat-badge plat-tao">타오바오</span>'
    ).join('');
    const linkBtns = seller.links.map(l=>
      `<a class="seller-link-btn ${l.cls}" href="${l.url}" target="_blank">${l.label} →</a>`
    ).join('');
    return `<div class="seller-block">
      <div class="seller-hd">
        <div class="seller-av">${seller.av}</div>
        <div class="seller-info">
          <div class="seller-nm">${seller.name}</div>
          <div class="seller-mt">${seller.meta}</div>
          <div class="seller-tags">${seller.tags.map(t=>`<span class="stag">${t}</span>`).join('')}</div>
          <div class="seller-desc">${seller.desc}</div>
          <div class="seller-links">${linkBtns}</div>
        </div>
        <div class="seller-plat">${platBadges}</div>
      </div>
      <div class="seller-grid">
        ${prods.map(p=>{
          const bg = CAT_BG[p.cat]||'bg-etc';
          const hasImg = p.img && IMGS[p.img];
          const sv = p.sellers.find(sv=>sv.id===s);
          return `<div class="pcard" onclick="openModal(${p.id})">
            <div class="pcard-img ${bg}">
              ${hasImg?`<img src="${IMGS[p.img]}" alt="${p.name}">`:`<span class="pcard-emoji" style="color:#993556">${p.emoji||p.name.charAt(0)}</span>`}
            </div>
            <div class="pcard-body">
              <div class="pcard-cat">${p.cat}</div>
              <div class="pcard-name">${p.name}</div>
              ${sv?`<div class="pcard-price-main">${fmtKrw(sv.cny)}</div><div class="pcard-price-sub">${fmtCny(sv.cny)}</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── 모달 ──
function openModal(id) {
  const p = PRODUCTS[id];
  const s_list = p.sellers;
  document.getElementById('m-title').textContent = p.name;
  document.getElementById('m-name').textContent = p.name;
  document.getElementById('m-desc').textContent = '각 판매자별 파츠 구성·크기·가격이 다를 수 있어요.';
  const hasImg = p.img && IMGS[p.img];
  const bg = CAT_BG[p.cat]||'bg-etc';
  const thumb = document.getElementById('m-thumb');
  thumb.className = 'modal-thumb ' + bg;
  thumb.innerHTML = hasImg ? `<img src="${IMGS[p.img]}" alt="${p.name}">` : `<span style="font-size:48px;color:#993556;font-weight:700">${p.emoji||p.name.charAt(0)}</span>`;
  document.getElementById('m-sellers').innerHTML = s_list.map(sv=>{
    const s = SELLERS[sv.id];
    const platBadge = s.plat.includes('xhs')
      ? '<span class="plat-badge plat-xhs">샤오홍수</span>'
      : '<span class="plat-badge plat-tao">타오바오</span>';
    const noteHtml = sv.note ? `<div class="so-note${sv.note.startsWith('주의')||sv.note.startsWith('⚠')?' ':' info'}">${sv.note}</div>` : '';
    const linkBtns = s.links.map(l=>`<a class="so-btn ${l.cls}" href="${l.url}" target="_blank">${l.label} →</a>`).join('');
    return `<div class="so-card">
      <div class="so-hd">
        <div class="so-av">${s.av}</div>
        <div><div class="so-nm">${s.name}</div><div class="so-mt">${s.meta}</div></div>
        ${platBadge}
        <div class="so-prices"><div class="so-krw">${fmtKrw(sv.cny)}</div><div class="so-cny">${fmtCny(sv.cny)}</div></div>
      </div>
      <div style="font-size:11px;color:#72243e;line-height:1.7;margin-bottom:8px;padding:8px 10px;background:#fbeaf0;border-radius:8px">${s.desc}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">${s.tags.map(t=>`<span style="background:#fff;border:1px solid #f4c0d1;border-radius:20px;padding:2px 8px;font-size:10px;color:#72243e">${t}</span>`).join('')}</div>
      ${noteHtml}
      <div class="so-btn-row">${linkBtns}</div>
    </div>`;
  }).join('');
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}
function closeBg(e) { if(e.target===document.getElementById('modal-bg')) closeModal(); }

// ── 페이지 전환 ──
function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  if(btn) btn.classList.add('on');
  const badge = document.getElementById('seller-badge');
  if(badge && name==='sellers') badge.style.display='none';
  window.scrollTo(0,0);
}

// ── 초기화 ──
renderPickGrid();
renderGrid();
renderSellerPage();
</script>
