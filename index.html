<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>말랑pick</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR",sans-serif;background:#fff5f8;color:#2d1a22;min-height:100vh}
nav{background:#fff;border-bottom:1px solid #f4c0d1;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;height:52px}
.logo{font-size:17px;font-weight:700;color:#2d1a22;cursor:pointer}
.logo em{color:#d4537e;font-style:normal}
.nav-tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:0 14px;height:52px;display:flex;align-items:center;font-size:13px;font-weight:500;color:#993556;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:inherit;transition:all .2s;white-space:nowrap}
.nav-tab:hover{color:#d4537e}
.nav-tab.on{color:#d4537e;font-weight:700;border-bottom-color:#d4537e}
.cart-btn{display:flex;align-items:center;gap:6px;background:#d4537e;color:#fff;border:none;border-radius:24px;padding:7px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;flex-shrink:0}
.cart-count{background:#fff;color:#d4537e;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;min-width:18px}
.page{display:none}
.page.on{display:block;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* STEP FLOW */
.step-wrap{max-width:700px;margin:0 auto;padding:24px 20px}
.step-indicator{display:flex;align-items:center;margin-bottom:28px}
.step-dot{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1}
.step-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .3s}
.step-circle.done{background:#d4537e;color:#fff}
.step-circle.active{background:#d4537e;color:#fff;box-shadow:0 0 0 4px #fbeaf0}
.step-circle.todo{background:#f4c0d1;color:#fff}
.step-label{font-size:10px;color:#993556;font-weight:500;white-space:nowrap}
.step-line{height:2px;background:#f4c0d1;flex:1;margin-top:-20px;transition:background .3s}
.step-line.done{background:#d4537e}
.step-title{font-size:20px;font-weight:700;color:#2d1a22;margin-bottom:6px}
.step-sub{font-size:13px;color:#993556;margin-bottom:20px;line-height:1.6}

/* 카테고리 필터 */
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-btn{border:1.5px solid #f4c0d1;border-radius:24px;padding:6px 14px;font-size:12px;font-weight:500;background:#fff;color:#993556;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;min-height:34px}
.cat-btn.on,.cat-btn:hover{background:#fbeaf0;border-color:#d4537e;color:#d4537e;font-weight:700}

/* 말랑이 담기 그리드 */
.pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pick-card{border:1.5px solid #f4c0d1;border-radius:14px;overflow:hidden;background:#fff;cursor:pointer;transition:all .2s;position:relative}
.pick-card:hover{border-color:#d4537e;transform:translateY(-2px)}
.pick-card.selected{border-color:#d4537e;background:#fbeaf0}
.pick-card-imgwrap{width:100%;aspect-ratio:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pick-card-imgwrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pick-card-check{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;background:#d4537e;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;z-index:2}
.pick-card.selected .pick-card-check{opacity:1}
.pick-card-body{padding:8px 10px 10px}
.pick-card-cat{font-size:10px;color:#b4a2ac;margin-bottom:2px}
.pick-card-name{font-size:11px;font-weight:700;color:#2d1a22;line-height:1.35}

/* 버튼 */
.next-btn{width:100%;background:#d4537e;color:#fff;border:none;border-radius:16px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:16px;transition:background .2s}
.next-btn:hover{background:#b8436a}
.next-btn:disabled{background:#f4c0d1;cursor:not-allowed}
.back-btn{width:100%;background:none;border:1px solid #f4c0d1;border-radius:16px;padding:13px;font-size:14px;font-weight:500;color:#993556;font-family:inherit;cursor:pointer;margin-top:10px;transition:all .2s}
.back-btn:hover{border-color:#d4537e;color:#d4537e}

/* STEP 2 - 카트 (판매자 정보 포함) */
.cart-list{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.cart-item{background:#fff;border:1px solid #f4c0d1;border-radius:16px;overflow:hidden}
.cart-item-top{display:flex;align-items:center;gap:12px;padding:12px 14px}
.cart-img{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#fbeaf0;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.cart-img img{width:100%;height:100%;object-fit:cover}
.cart-info{flex:1}
.cart-name{font-size:13px;font-weight:700;color:#2d1a22;margin-bottom:2px}
.cart-cat{font-size:11px;color:#993556}
.cart-del{background:none;border:1px solid #f4c0d1;border-radius:20px;padding:5px 11px;font-size:11px;color:#993556;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .2s}
.cart-del:hover{border-color:#d4537e;color:#d4537e;background:#fbeaf0}
/* 판매자 정보 (접힌 상태) */
.cart-seller-toggle{width:100%;background:none;border:none;border-top:1px solid #fbeaf0;padding:8px 14px;font-size:11px;color:#993556;font-weight:500;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:4px}
.cart-seller-toggle:hover{background:#fbeaf0}
.cart-seller-info{display:none;padding:10px 14px 14px;border-top:1px solid #fbeaf0;background:#fbeaf0}
.cart-seller-info.open{display:block}
.csi-card{background:#fff;border:1px solid #f4c0d1;border-radius:12px;padding:10px 12px;margin-bottom:8px}
.csi-card:last-child{margin-bottom:0}
.csi-hd{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.csi-av{width:26px;height:26px;border-radius:50%;background:#fbeaf0;border:1px solid #f4c0d1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#d4537e;flex-shrink:0}
.csi-nm{font-size:12px;font-weight:700;color:#2d1a22}
.csi-price{margin-left:auto;font-size:12px;font-weight:700;color:#d4537e}
.csi-cny{font-size:10px;color:#b4a2ac;margin-left:4px}
.csi-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.csi-tag{background:#fbeaf0;border:1px solid #f4c0d1;border-radius:20px;padding:2px 7px;font-size:10px;color:#72243e}
.plat-sm{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px}
.plat-sm-xhs{background:#fff0f3;border:1px solid #ff2442;color:#cc1133}
.plat-sm-tao{background:#fff2e8;border:1px solid #ff6900;color:#cc4400}

/* STEP 3 */
.result-cards{display:flex;flex-direction:column;gap:14px}
.result-card{border:1.5px solid #f4c0d1;border-radius:16px;overflow:hidden;background:#fff}
.result-card.best{border-color:#d4537e;box-shadow:0 4px 16px rgba(212,83,126,.15)}
.result-hd{display:flex;align-items:center;gap:10px;padding:13px 15px;background:#fbeaf0;border-bottom:1px solid #f4c0d1}
.result-badge{background:#d4537e;color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;flex-shrink:0}
.result-seller-chips{display:flex;gap:8px;flex:1;flex-wrap:wrap;align-items:center}
.result-chip{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#2d1a22}
.result-av{width:26px;height:26px;border-radius:50%;background:#fff;border:1px solid #f4c0d1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#d4537e}
.result-body{padding:13px 15px}
.cov-bar{height:5px;background:#f4c0d1;border-radius:3px;margin-bottom:8px;overflow:hidden}
.cov-fill{height:100%;background:#d4537e;border-radius:3px;transition:width .6s ease}
.cov-text{font-size:12px;color:#993556;margin-bottom:10px}
.item-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.itag{background:#fbeaf0;border:1px solid #f4c0d1;border-radius:20px;padding:3px 9px;font-size:11px;color:#2d1a22}
.itag.no{background:#f5f5f5;border-color:#e0e0e0;color:#bbb;text-decoration:line-through}
.combo-detail{margin-bottom:10px}
.combo-row{font-size:11px;color:#72243e;padding:6px 10px;background:#fbeaf0;border-radius:8px;border:1px solid #f4c0d1;margin-bottom:5px}
.price-box{background:#fbeaf0;border-radius:10px;padding:11px 13px;margin-bottom:12px}
.price-row{display:flex;justify-content:space-between;font-size:12px;color:#72243e;margin-bottom:4px}
.price-row.total{margin-bottom:0;font-weight:700;font-size:13px;color:#2d1a22;border-top:1px solid #f4c0d1;padding-top:7px;margin-top:5px}
.go-btn{display:block;width:100%;background:#ff2442;color:#fff;border:none;border-radius:12px;padding:11px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;text-align:center;transition:opacity .2s;margin-bottom:6px}
.go-btn:hover{opacity:.85}
.go-btn.tao{background:#ff6900}

/* 말랑이 목록 */
.list-hero{background:linear-gradient(135deg,#fbeaf0,#fce8f3);border-bottom:1px solid #f4c0d1;padding:32px 28px 24px}
.list-hero-inner{max-width:1080px;margin:0 auto}
.section-title{font-size:20px;font-weight:700;color:#2d1a22;margin-bottom:4px}
.section-sub{font-size:13px;color:#993556}
.list-wrap{max-width:1080px;margin:0 auto;padding:26px 28px}
.top-controls{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-box input{border:1.5px solid #f4c0d1;border-radius:24px;padding:9px 16px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#2d1a22;width:220px;transition:border-color .2s}
.search-box input:focus{border-color:#d4537e}
.search-box input::placeholder{color:#b4a2ac}
.prod-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:13px}
.pcard{border:1px solid #f4c0d1;border-radius:16px;overflow:hidden;background:#fff;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s}
.pcard:hover{transform:translateY(-4px);box-shadow:0 8px 22px rgba(212,83,126,.14);border-color:#d4537e}
.pcard-img{width:100%;aspect-ratio:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pcard-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .3s}
.pcard:hover .pcard-img img{transform:scale(1.07)}
.pcard-emoji{font-size:40px;position:relative;z-index:1;color:#993556}
.sdots{position:absolute;top:8px;left:8px;display:flex;gap:3px;z-index:2}
.sdot{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;color:#fff;line-height:1.4}
.sdot-xhs{background:#ff2442}
.sdot-tao{background:#ff6900}
.pcard-body{padding:9px 11px 12px}
.pcard-cat{font-size:10px;color:#b4a2ac;margin-bottom:2px}
.pcard-name{font-size:12px;font-weight:700;color:#2d1a22;line-height:1.35;margin-bottom:4px}
.pcard-price{font-size:12px;font-weight:700;color:#d4537e}
.pcard-sub{font-size:10px;color:#b4a2ac;margin-top:1px}
.bg-crunch{background:#FEF3CD}.bg-transparent{background:#E8F4FD}.bg-kuma{background:#EEF3FE}
.bg-squishy{background:#FFF0E8}.bg-slang{background:#FBEAF0}.bg-etc{background:#F0FAF0}

/* 판매자 페이지 */
.seller-page{max-width:1080px;margin:0 auto;padding:28px}
.sfilter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.sfilter-btn{display:flex;align-items:center;gap:6px;border:1.5px solid #f4c0d1;border-radius:24px;padding:7px 15px;font-size:12px;font-weight:500;background:#fff;color:#993556;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.sfilter-btn.on,.sfilter-btn:hover{background:#fbeaf0;border-color:#d4537e;color:#d4537e;font-weight:700}
.seller-block{margin-bottom:40px}
.seller-hd{display:flex;align-items:flex-start;gap:14px;background:#fbeaf0;border:1px solid #f4c0d1;border-radius:16px;padding:16px 18px;margin-bottom:14px}
.seller-av{width:46px;height:46px;border-radius:50%;background:#fff;border:1.5px solid #f4c0d1;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#d4537e;flex-shrink:0}
.seller-info{flex:1}
.seller-nm{font-size:15px;font-weight:700;color:#2d1a22;margin-bottom:3px}
.seller-mt{font-size:12px;color:#993556;margin-bottom:6px}
.seller-desc{font-size:12px;color:#72243e;line-height:1.7;margin-bottom:8px}
.seller-tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.stag{background:#fff;border:1px solid #f4c0d1;border-radius:20px;padding:3px 9px;font-size:11px;color:#72243e}
.seller-links{display:flex;gap:7px;flex-wrap:wrap}
.seller-link-btn{display:inline-flex;align-items:center;color:#fff;border:none;border-radius:18px;padding:7px 14px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;transition:opacity .2s}
.seller-link-btn:hover{opacity:.85}
.btn-xhs{background:#ff2442}.btn-tao{background:#ff6900}
.seller-plat{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.plat-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px}
.plat-xhs{background:#fff0f3;border:1.5px solid #ff2442;color:#cc1133}
.plat-tao{background:#fff2e8;border:1.5px solid #ff6900;color:#cc4400}
.seller-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}

/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(75,21,40,.52);z-index:500;align-items:flex-start;justify-content:center;padding:28px 14px;overflow-y:auto}
.modal-bg.open{display:flex;animation:fadeUp .2s ease}
.modal{background:#fff;border-radius:22px;max-width:720px;width:100%;border:1px solid #f4c0d1}
.modal-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #fbeaf0;border-radius:22px 22px 0 0;position:sticky;top:0;background:#fff;z-index:10}
.modal-bar-title{font-size:14px;font-weight:700;color:#2d1a22}
.modal-x{background:none;border:1px solid #f4c0d1;border-radius:18px;padding:5px 13px;font-size:12px;color:#993556;cursor:pointer;font-family:inherit;transition:all .2s}
.modal-x:hover{background:#fbeaf0;border-color:#d4537e;color:#d4537e}
.modal-top{display:flex;gap:16px;padding:18px 20px 14px}
.modal-thumb{width:170px;height:170px;border-radius:14px;flex-shrink:0;border:1px solid #f4c0d1;display:flex;align-items:center;justify-content:center;overflow:hidden}
.modal-thumb img{width:100%;height:100%;object-fit:cover}
.modal-right{flex:1}
.modal-pname{font-size:18px;font-weight:700;color:#2d1a22;line-height:1.3;margin-bottom:6px}
.modal-desc{font-size:12px;color:#72243e;line-height:1.7;background:#fbeaf0;border-radius:10px;padding:9px 12px;margin-bottom:10px}
.so-wrap{padding:0 20px 20px}
.so-title{font-size:13px;font-weight:700;color:#2d1a22;margin-bottom:10px}
.so-card{border:1px solid #f4c0d1;border-radius:14px;padding:13px 15px;margin-bottom:9px}
.so-hd{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.so-av{width:30px;height:30px;border-radius:50%;background:#fbeaf0;border:1px solid #f4c0d1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#d4537e;flex-shrink:0}
.so-nm{font-size:13px;font-weight:700;color:#2d1a22}
.so-mt{font-size:10px;color:#993556;margin-top:1px}
.so-prices{margin-left:auto;text-align:right}
.so-krw{font-size:14px;font-weight:700;color:#d4537e}
.so-cny{font-size:10px;color:#b4a2ac;margin-top:1px}
.so-note{font-size:11px;color:#72243e;background:#fef9e7;border:1px solid #f4d03f;border-radius:8px;padding:7px 10px;line-height:1.6;margin-bottom:8px}
.so-desc{font-size:11px;color:#72243e;line-height:1.7;margin-bottom:8px;padding:8px 10px;background:#fbeaf0;border-radius:8px}
.so-btn-row{display:flex;gap:7px;flex-wrap:wrap}
.so-btn{display:inline-flex;color:#fff;border:none;border-radius:18px;padding:7px 14px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;transition:opacity .2s}
.so-btn:hover{opacity:.85}

footer{background:#4b1528;color:#f4c0d1;text-align:center;padding:22px;font-size:12px}
footer strong{color:#fff}

@media(max-width:900px){.prod-grid,.seller-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){
  nav{padding:0 14px;height:50px}
  .logo{font-size:15px}
  .nav-tab{padding:0 10px;font-size:12px;height:50px}
  .cart-btn{padding:6px 10px;font-size:11px}
  .step-wrap{padding:18px 14px}
  .step-title{font-size:17px}
  .pick-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .prod-grid,.seller-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .seller-page,.list-wrap{padding:18px 14px}
  .list-hero{padding:24px 14px 20px}
  .modal-bg{padding:0;align-items:flex-end}
  .modal{border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto}
  .modal-top{flex-direction:column}
  .modal-thumb{width:100%;height:180px}
  footer{padding:18px 14px}
}
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="goPage('pick',document.getElementById('tab-pick'))">말랑<em>pick</em></div>
  <div class="nav-tabs">
    <button class="nav-tab on" id="tab-pick" onclick="goPage('pick',this)">담기</button>
    <button class="nav-tab" id="tab-items" onclick="goPage('items',this)">말랑이 보기</button>
    <button class="nav-tab" id="tab-sellers" onclick="goPage('sellers',this)">판매자 보기</button>
  </div>
  <button class="cart-btn" onclick="goPage('pick',document.getElementById('tab-pick'));if(cart.size>0){goStep(2);}">
    담은 말랑이 <span class="cart-count" id="cart-count">0</span>
  </button>
</nav>

<!-- PICK PAGE -->
<div id="page-pick" class="page on">
  <div class="step-wrap">
    <div class="step-indicator">
      <div class="step-dot"><div class="step-circle active" id="si-1">1</div><div class="step-label">담기</div></div>
      <div class="step-line" id="sl-1"></div>
      <div class="step-dot"><div class="step-circle todo" id="si-2">2</div><div class="step-label">판매자 추천</div></div>
    </div>
    <!-- STEP 1 -->
    <div id="step-1">
      <div class="step-title">원하는 말랑이를 골라요</div>
      <div class="step-sub">담고 싶은 말랑이를 모두 선택해주세요. 어디서 한 번에 살 수 있는지 찾아드릴게요!</div>
      <!-- 담은 개수 바 -->
      <div id="cart-bar" style="display:none;background:#fbeaf0;border:1.5px solid #d4537e;border-radius:14px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="background:#d4537e;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700" id="cart-bar-count">0</div>
          <span style="font-size:13px;font-weight:700;color:#2d1a22">개 담았어요</span>

const BAEDAE = 22;
const CAT_BG = {
  '크런치':'bg-crunch','투명':'bg-transparent','쿠마':'bg-kuma',
  '스퀴시':'bg-squishy','슬랑이':'bg-slang','기타':'bg-etc'
};

function getImg(p){ return p.img && IMGS[p.img] ? IMGS[p.img] : null; }
function getEmoji(p){ return p.emoji || p.name.charAt(0); }
function getBg(p){ return CAT_BG[p.cat]||'bg-etc'; }

// ── 카트 ──
var cart = new Set();

function toggleCart(id){
  if(cart.has(id)) cart.delete(id); else cart.add(id);
  document.getElementById('cart-count').textContent = cart.size;
  document.getElementById('step1-next').disabled = cart.size === 0;
  updateCartBar();
  renderPickGrid();
}

function updateCartBar(){
  var bar = document.getElementById('cart-bar');
  var countEl = document.getElementById('cart-bar-count');
  var namesEl = document.getElementById('cart-bar-names');
  if(cart.size === 0){
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'flex';
  countEl.textContent = cart.size;
  var names = PRODUCTS.filter(function(p){ return cart.has(p.id); }).map(function(p){ return p.name; });
  namesEl.textContent = names.join(', ');
}

function removeFromCart(id){
  cart.delete(id);
  document.getElementById('cart-count').textContent = cart.size;
  updateCartBar();
  renderPickGrid();
  renderCartList();
  // 카트 패널 카운트 업데이트
  var cpCount = document.getElementById('cart-panel-count');
  if(cpCount) cpCount.textContent = cart.size + '개';
  if(cart.size === 0){
    goStep(1);
  } else {
    // 빼는 즉시 추천 자동 업데이트
    renderResults();
  }
}

// ── STEP 1: 그리드 ──
var pickCat = '전체';
function setPickCat(cat, btn){
  pickCat = cat;
  document.querySelectorAll('#pick-cat-row .cat-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  renderPickGrid();
}

function renderPickGrid(){
  var list = pickCat === '전체' ? PRODUCTS : PRODUCTS.filter(function(p){ return p.cat === pickCat; });
  var el = document.getElementById('pick-grid');
  el.innerHTML = list.map(function(p){
    var sel = cart.has(p.id);
    var img = getImg(p);
    var bg = getBg(p);
    return '<div class="pick-card' + (sel ? ' selected' : '') + '" onclick="toggleCart(' + p.id + ')">' +
      '<div class="pick-card-imgwrap ' + bg + '">' +
        (img ? '<img src="' + img + '" alt="' + p.name + '">' : '<span style="font-size:34px;position:relative;z-index:1;color:#993556">' + getEmoji(p) + '</span>') +
        '<div class="pick-card-check">✓</div>' +
      '</div>' +
      '<div class="pick-card-body">' +
        '<div class="pick-card-cat">' + p.cat + '</div>' +
        '<div class="pick-card-name">' + p.name + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ── STEP 2: 카트 (판매자 정보 포함) ──
function renderCartList(){
  var items = PRODUCTS.filter(function(p){ return cart.has(p.id); });
  var el = document.getElementById('cart-list');
  if(!items.length){ el.innerHTML='<div style="text-align:center;padding:40px;color:#b4a2ac">담은 말랑이가 없어요</div>'; return; }
  el.innerHTML = items.map(function(p){
    var img = getImg(p);
    var bg = getBg(p);
    var sellerCards = p.sellers.map(function(sv){
      var s = SELLERS[sv.id];
      var platBadges = s.plat.map(function(pl){
        return pl === 'xhs'
          ? '<span class="plat-sm plat-sm-xhs">샤오홍수</span>'
          : '<span class="plat-sm plat-sm-tao">타오바오</span>';
      }).join('');
      var noteHtml = sv.note ? '<div style="font-size:10px;color:#ba7517;margin-top:4px">⚠ ' + sv.note + '</div>' : '';
      return '<div class="csi-card">' +
        '<div class="csi-hd">' +
          '<div class="csi-av">' + s.av + '</div>' +
          '<div class="csi-nm">' + s.name + '</div>' +
          '<span class="csi-price">' + fmtKrw(sv.cny) + '</span>' +
          '<span class="csi-cny">' + sv.cny + '위안</span>' +
        '</div>' +
        '<div class="csi-tags">' +
          s.tags.map(function(t){ return '<span class="csi-tag">' + t + '</span>'; }).join('') +
          platBadges +
        '</div>' +
        noteHtml +
      '</div>';
    }).join('');
    return '<div class="cart-item">' +
      '<div class="cart-item-top">' +
        '<div class="cart-img ' + bg + '">' +
          (img ? '<img src="' + img + '" alt="' + p.name + '">' : '<span>' + getEmoji(p) + '</span>') +
        '</div>' +
        '<div class="cart-info">' +
          '<div class="cart-name">' + p.name + '</div>' +
          '<div class="cart-cat">' + p.cat + ' · 판매자 ' + p.sellers.length + '곳</div>' +
        '</div>' +
        '<button class="cart-del" onclick="removeFromCart(' + p.id + ')">빼기</button>' +
      '</div>' +
      '<button class="cart-seller-toggle" onclick="toggleSellerInfo(this)">판매자 정보 보기 ▾</button>' +
      '<div class="cart-seller-info">' + sellerCards + '</div>' +
    '</div>';
  }).join('');
}

function toggleSellerInfo(btn){
  var info = btn.nextElementSibling;
  var open = info.classList.toggle('open');
  btn.textContent = open ? '판매자 정보 닫기 ▴' : '판매자 정보 보기 ▾';
}

// ── STEP 3: 추천 ──
function renderResults(){
  var cartItems = PRODUCTS.filter(function(p){ return cart.has(p.id); });
  var total = cartItems.length;
  document.getElementById('step3-sub').textContent = total + '개 말랑이 기준 · 단일 판매자 및 2인 조합 추천이에요.';

  var sellerIds = Object.keys(SELLERS);

  // 단일
  var singles = sellerIds.map(function(sid){
    var avail = cartItems.filter(function(p){ return p.sellers.some(function(sv){ return sv.id === sid; }); });
    var totalCny = avail.reduce(function(s,p){
      var sv = p.sellers.find(function(sv){ return sv.id === sid; });
      return s + (sv ? parseFloat(sv.cny) : 0);
    }, 0);
    return { type:'single', sids:[sid], avail:avail, unavail:cartItems.filter(function(p){ return !p.sellers.some(function(sv){ return sv.id===sid; }); }), totalCny:totalCny, count:avail.length };
  }).filter(function(r){ return r.count > 0; });

  // 2인 조합
  var combos = [];
  for(var i=0;i<sellerIds.length;i++){
    for(var j=i+1;j<sellerIds.length;j++){
      var s1=sellerIds[i], s2=sellerIds[j];
      var avail2 = cartItems.filter(function(p){ return p.sellers.some(function(sv){ return sv.id===s1||sv.id===s2; }); });
      var maxSingle = Math.max(
        (singles.find(function(r){ return r.sids[0]===s1; })||{count:0}).count,
        (singles.find(function(r){ return r.sids[0]===s2; })||{count:0}).count
      );
      if(avail2.length <= maxSingle) continue;
      var totalCny2 = cartItems.reduce(function(sum,p){
        var sv1 = p.sellers.find(function(sv){ return sv.id===s1; });
        var sv2 = p.sellers.find(function(sv){ return sv.id===s2; });
        var both = [sv1,sv2].filter(Boolean).sort(function(a,b){ return parseFloat(a.cny)-parseFloat(b.cny); });
        return sum + (both.length ? parseFloat(both[0].cny) : 0);
      }, 0);
      combos.push({ type:'combo', sids:[s1,s2], avail:avail2, unavail:cartItems.filter(function(p){ return !avail2.some(function(q){ return q.id===p.id; }); }), totalCny:totalCny2, count:avail2.length });
    }
  }

  var all = singles.concat(combos).sort(function(a,b){ return b.count-a.count || a.totalCny-b.totalCny; }).slice(0,4);

  var el = document.getElementById('result-list');
  el.innerHTML = all.map(function(r, idx){
    var isBest = idx===0;
    var pct = Math.round(r.count/total*100);
    var totalKrw = Math.round(r.totalCny*CNY);
    var baedaeKrw = Math.round(BAEDAE*CNY);
    var grand = totalKrw + baedaeKrw;
    var isCombo = r.type==='combo';

    var chips = r.sids.map(function(sid){
      var s = SELLERS[sid];
      return '<div class="result-chip"><div class="result-av">' + s.av + '</div>' + s.name + '</div>';
    }).join('<span style="color:#f4c0d1;margin:0 2px">+</span>');

    var comboDetail = '';
    if(isCombo){
      comboDetail = '<div class="combo-detail">' + r.sids.map(function(sid){
        var s = SELLERS[sid];
        var mine = r.avail.filter(function(p){
          var sv = p.sellers.find(function(sv){ return sv.id===sid; });
          if(!sv) return false;
          var others = r.sids.filter(function(x){ return x!==sid; });
          var otherMin = others.map(function(x){ var ov=p.sellers.find(function(sv){ return sv.id===x; }); return ov?parseFloat(ov.cny):Infinity; });
          return parseFloat(sv.cny) <= Math.min.apply(null, otherMin);
        });
        var myCny = mine.reduce(function(s,p){ var sv=p.sellers.find(function(sv){ return sv.id===sid; }); return s+(sv?parseFloat(sv.cny):0); },0);
        return '<div class="combo-row"><strong>' + s.av + ' ' + s.name + '</strong> — ' + mine.map(function(p){ return p.name; }).join(', ') + ' (' + myCny.toFixed(1) + '위안)</div>';
      }).join('') + '</div>';
    }

    var linkBtns = r.sids.map(function(sid){
      var s = SELLERS[sid];
      return s.links.map(function(l){
        return '<a class="go-btn' + (l.cls==='btn-tao'?' tao':'') + '" href="' + l.url + '" target="_blank">' + s.name + ' — ' + l.label + ' →</a>';
      }).join('');
    }).join('');

    return '<div class="result-card' + (isBest?' best':'') + '">' +
      '<div class="result-hd">' +
        '<div class="result-seller-chips">' + chips + '</div>' +
        (isBest?'<span class="result-badge">최적 추천</span>':'') +
      '</div>' +
      '<div class="result-body">' +
        '<div class="cov-bar"><div class="cov-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="cov-text">' + total + '개 중 <strong style="color:#d4537e">' + r.count + '개</strong> 구매 가능 (' + pct + '%)</div>' +
        '<div class="item-tags">' +
          r.avail.map(function(p){ return '<span class="itag">' + p.name + '</span>'; }).join('') +
          r.unavail.map(function(p){ return '<span class="itag no">' + p.name + '</span>'; }).join('') +
        '</div>' +
        comboDetail +
        '<div class="price-box">' +
          (isCombo?'<div class="price-row"><span>두 판매자 합산</span><span>' + r.totalCny.toFixed(1) + '위안 (' + totalKrw.toLocaleString() + '원)</span></div>'
            :'<div class="price-row"><span>말랑이 합계</span><span>' + r.totalCny.toFixed(1) + '위안 (' + totalKrw.toLocaleString() + '원)</span></div>') +
          '<div class="price-row"><span>배대지 배송비 (예상)</span><span>약 ' + BAEDAE + '위안 (' + baedaeKrw.toLocaleString() + '원)</span></div>' +
          '<div class="price-row total"><span>총 예상 금액</span><span>' + (r.totalCny+BAEDAE).toFixed(1) + '위안 (' + grand.toLocaleString() + '원)</span></div>' +
        '</div>' +
        linkBtns +
      '</div>' +
    '</div>';
  }).join('');
}

// ── STEP 전환 ──
function goStep(n){
  document.getElementById('step-1').style.display = n===1?'block':'none';
  document.getElementById('step-2').style.display = n===2?'block':'none';
  // 인디케이터 (2단계)
  var s1 = document.getElementById('si-1');
  var s2 = document.getElementById('si-2');
  var sl1 = document.getElementById('sl-1');
  s1.className = 'step-circle ' + (n===1?'active':'done');
  s2.className = 'step-circle ' + (n===2?'active':'todo');
  sl1.className = 'step-line' + (n===2?' done':'');
  if(n===2){
    renderCartList();
    renderResults();
    // 카트 패널 카운트 업데이트
    document.getElementById('cart-panel-count').textContent = cart.size + '개';
  }
  if(n===1){
    // 카트 패널 닫기
    var panel = document.getElementById('cart-panel');
    if(panel) panel.style.display = 'none';
    var title = document.getElementById('cart-panel-title');
    if(title) title.textContent = '담은 말랑이 보기 ▾';
  }
  window.scrollTo(0,0);
}

function toggleCartPanel(btn){
  var panel = document.getElementById('cart-panel');
  var title = document.getElementById('cart-panel-title');
  var open = panel.style.display === 'none';
  panel.style.display = open ? 'block' : 'none';
  title.textContent = open ? '담은 말랑이 닫기 ▴' : '담은 말랑이 보기 ▾';
}

function reRecommend(){
  // 카트 패널 닫고 추천 다시 렌더
  var panel = document.getElementById('cart-panel');
  panel.style.display = 'none';
  document.getElementById('cart-panel-title').textContent = '담은 말랑이 보기 ▾';
  document.getElementById('cart-panel-count').textContent = cart.size + '개';
  renderResults();
  document.getElementById('result-list').scrollIntoView({behavior:'smooth'});
}

// ── 말랑이 목록 ──
var curCat = '전체';
function setCat(cat, btn){
  curCat = cat;
  document.querySelectorAll('#page-items .cat-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  renderGrid();
}
function renderGrid(){
  var q = (document.getElementById('search-q')||{}).value||'';
  var list = curCat==='전체' ? PRODUCTS : PRODUCTS.filter(function(p){ return p.cat===curCat; });
  if(q) list = list.filter(function(p){ return p.name.includes(q); });
  var grid = document.getElementById('main-grid');
  if(!list.length){ grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:#b4a2ac">검색 결과가 없어요</div>'; return; }
  grid.innerHTML = list.map(function(p){
    var img = getImg(p);
    var bg = getBg(p);
    var plats = [];
    p.sellers.forEach(function(sv){ SELLERS[sv.id].plat.forEach(function(pl){ if(plats.indexOf(pl)<0) plats.push(pl); }); });
    var dots = plats.map(function(pl){ return pl==='xhs'?'<span class="sdot sdot-xhs">小</span>':'<span class="sdot sdot-tao">T</span>'; }).join('');
    var prices = p.sellers.map(function(s){ return parseFloat(s.cny); }).filter(function(n){ return !isNaN(n); });
    var mc = prices.length ? Math.min.apply(null, prices) : null;
    return '<div class="pcard" onclick="openModal(' + p.id + ')">' +
      '<div class="pcard-img ' + bg + '">' +
        (img?'<img src="'+img+'" alt="'+p.name+'">':'<span class="pcard-emoji">'+getEmoji(p)+'</span>') +
        '<div class="sdots">' + dots + '</div>' +
      '</div>' +
      '<div class="pcard-body">' +
        '<div class="pcard-cat">' + p.cat + '</div>' +
        '<div class="pcard-name">' + p.name + '</div>' +
        (mc!==null?'<div class="pcard-price">'+fmtKrw(mc.toString())+'~</div>':'') +
        '<div class="pcard-sub">판매자 ' + p.sellers.length + '곳</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ── 판매자 페이지 ──
function renderSellerPage(){
  var frow = document.getElementById('sfilter-row');
  var allBtn = document.createElement('button');
  allBtn.className = 'sfilter-btn on';
  allBtn.textContent = '전체 보기';
  allBtn.onclick = function(){ setSeller('all', this); };
  frow.appendChild(allBtn);
  Object.keys(SELLERS).forEach(function(sid){
    var s = SELLERS[sid];
    var btn = document.createElement('button');
    btn.className = 'sfilter-btn';
    btn.textContent = s.av + ' ' + s.name;
    btn.onclick = function(){ setSeller(sid, this); };
    frow.appendChild(btn);
  });
  renderSellerSections('all');
}

function setSeller(sid, btn){
  document.querySelectorAll('.sfilter-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  renderSellerSections(sid);
}

function renderSellerSections(sid){
  var wrap = document.getElementById('seller-sections');
  var toShow = sid==='all' ? Object.keys(SELLERS) : [sid];
  wrap.innerHTML = toShow.map(function(s){
    var seller = SELLERS[s];
    var prods = PRODUCTS.filter(function(p){ return p.sellers.some(function(sv){ return sv.id===s; }); });
    var platBadges = seller.plat.map(function(pl){
      return pl==='xhs'?'<span class="plat-badge plat-xhs">샤오홍수</span>':'<span class="plat-badge plat-tao">타오바오</span>';
    }).join('');
    var linkBtns = seller.links.map(function(l){
      return '<a class="seller-link-btn ' + l.cls + '" href="' + l.url + '" target="_blank">' + l.label + ' →</a>';
    }).join('');
    var cards = prods.map(function(p){
      var img = getImg(p);
      var bg = getBg(p);
      var sv = p.sellers.find(function(sv){ return sv.id===s; });
      return '<div class="pcard" onclick="openModal(' + p.id + ')">' +
        '<div class="pcard-img ' + bg + '">' +
          (img?'<img src="'+img+'" alt="'+p.name+'">':'<span class="pcard-emoji">'+getEmoji(p)+'</span>') +
        '</div>' +
        '<div class="pcard-body">' +
          '<div class="pcard-cat">' + p.cat + '</div>' +
          '<div class="pcard-name">' + p.name + '</div>' +
          (sv?'<div class="pcard-price">'+fmtKrw(sv.cny)+'</div><div class="pcard-sub">'+fmtCny(sv.cny)+'</div>':'') +
        '</div>' +
      '</div>';
    }).join('');
    return '<div class="seller-block">' +
      '<div class="seller-hd">' +
        '<div class="seller-av">' + seller.av + '</div>' +
        '<div class="seller-info">' +
          '<div class="seller-nm">' + seller.name + '</div>' +
          '<div class="seller-mt">' + seller.meta + '</div>' +
          '<div class="seller-tags-row">' + seller.tags.map(function(t){ return '<span class="stag">'+t+'</span>'; }).join('') + '</div>' +
          '<div class="seller-desc">' + seller.desc + '</div>' +
          '<div class="seller-links">' + linkBtns + '</div>' +
        '</div>' +
        '<div class="seller-plat">' + platBadges + '</div>' +
      '</div>' +
      '<div class="seller-grid">' + cards + '</div>' +
    '</div>';
  }).join('');
}

// ── 모달 ──
function openModal(id){
  var p = PRODUCTS[id];
  document.getElementById('m-title').textContent = p.name;
  document.getElementById('m-name').textContent = p.name;
  document.getElementById('m-desc').textContent = '각 판매자별 파츠 구성·크기·가격이 다를 수 있어요.';
  var img = getImg(p);
  var thumb = document.getElementById('m-thumb');
  thumb.className = 'modal-thumb ' + getBg(p);
  thumb.innerHTML = img ? '<img src="'+img+'" alt="'+p.name+'">' : '<span style="font-size:48px;color:#993556">'+getEmoji(p)+'</span>';
  document.getElementById('m-sellers').innerHTML = p.sellers.map(function(sv){
    var s = SELLERS[sv.id];
    var platBadge = s.plat.includes('xhs') ? '<span class="plat-badge plat-xhs">샤오홍수</span>' : '<span class="plat-badge plat-tao">타오바오</span>';
    var noteHtml = sv.note ? '<div class="so-note">' + sv.note + '</div>' : '';
    var linkBtns = s.links.map(function(l){ return '<a class="so-btn ' + l.cls + '" href="' + l.url + '" target="_blank">' + l.label + ' →</a>'; }).join('');
    return '<div class="so-card">' +
      '<div class="so-hd">' +
        '<div class="so-av">' + s.av + '</div>' +
        '<div><div class="so-nm">' + s.name + '</div><div class="so-mt">' + s.meta + '</div></div>' +
        platBadge +
        '<div class="so-prices"><div class="so-krw">' + fmtKrw(sv.cny) + '</div><div class="so-cny">' + fmtCny(sv.cny) + '</div></div>' +
      '</div>' +
      '<div class="so-desc">' + s.desc + '</div>' +
      '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">' + s.tags.map(function(t){ return '<span style="background:#fbeaf0;border:1px solid #f4c0d1;border-radius:20px;padding:2px 8px;font-size:10px;color:#72243e">'+t+'</span>'; }).join('') + '</div>' +
      noteHtml +
      '<div class="so-btn-row">' + linkBtns + '</div>' +
    '</div>';
  }).join('');
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); document.body.style.overflow=''; }

// ── 페이지 전환 ──
function goPage(name, btn){
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.nav-tab').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('page-'+name).classList.add('on');
  if(btn) btn.classList.add('on');
  window.scrollTo(0,0);
}

// ── 초기화 ──
renderPickGrid();
renderGrid();
renderSellerPage();
</script>
</body>
</html>
